name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff bandit
      - name: Ruff lint
        run: ruff check slopcheck/
      - name: Ruff format check
        run: ruff format --check slopcheck/
      - name: Bandit security scan
        run: bandit -r slopcheck/ -c pyproject.toml

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyright requests
      - name: Pyright
        run: pyright slopcheck/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: pytest tests/ --cov=slopcheck --cov-report=term-missing --cov-fail-under=40

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pip-audit
      - name: Audit dependencies
        run: pip-audit -r <(echo "requests>=2.28.0")

  dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e .
      - name: slopcheck on slopcheck
        run: slopcheck .
