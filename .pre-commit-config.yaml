repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-r, slopcheck/, -c, pyproject.toml]

  - repo: local
    hooks:
      - id: slopcheck
        name: slopcheck
        entry: slopcheck .
        language: python
        pass_filenames: false
        additional_dependencies: [slopcheck]
        files: (requirements.*\.txt|pyproject\.toml|package\.json|Cargo\.toml|go\.mod|Gemfile|pom\.xml|build\.gradle|composer\.json)$
